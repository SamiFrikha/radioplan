
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="manifest" href="/radioplan/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/radioplan/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/radioplan/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/radioplan/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/radioplan/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/radioplan/icon-192.png" />
    <meta name="msapplication-TileImage" content="/radioplan/ms-icon-144x144.png" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RadioPlan" />
    <title>RadioPlan AI - Radiothérapie</title>
    <style>
      @media print {
        @page {
          margin: 0.5cm;
          size: landscape;
        }

        body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background-color: white !important;
        }

        /*
           CRITICAL PRINT FIXES:
           The main app container uses flex and min-h-dvh which breaks printing (clips content).
           We must reset these to block/auto for print.
        */
        #root, .min-h-dvh {
            display: block !important;
            height: auto !important;
            overflow: visible !important;
        }

        /* Hide Sidebar and non-print elements */
        aside, .print\:hidden {
          display: none !important;
        }

        /* Unwrap the main content area */
        main {
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          max-width: none !important;
          height: auto !important;
          overflow: visible !important;
          display: block !important;
        }

        /* Ensure Tables Expand */
        table {
          width: 100% !important;
          table-layout: fixed !important;
        }

        thead {
            display: table-header-group;
        }

        tr {
            break-inside: avoid;
        }

        /* Reset Scrolling containers */
        .overflow-auto, .overflow-y-auto, .overflow-x-hidden {
          overflow: visible !important;
          height: auto !important;
          max-height: none !important;
        }

        /* Remove sticky headers in print to avoid overlap/cut-off */
        .sticky {
            position: static !important;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
</head>
  <body class="antialiased">
    <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
