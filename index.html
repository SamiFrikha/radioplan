
<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="manifest" href="/radioplan/manifest.json" />
    <link rel="icon" type="image/x-icon" href="/radioplan/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/radioplan/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/radioplan/favicon-16x16.png" />
    <!-- iOS icons — sized properly for each device -->
    <link rel="apple-touch-icon" href="/radioplan/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/radioplan/icon-120.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/radioplan/icon-152.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/radioplan/icon-167.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/radioplan/icon-180.png" />
    <meta name="msapplication-TileImage" content="/radioplan/ms-icon-144x144.png" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RadioPlan" />
    <title>RadioPlan AI - Radiothérapie</title>
    <style>
      @media print {
        @page {
          margin: 0.5cm;
          size: landscape;
        }

        body {
          -webkit-print-color-adjust: exact !important;
          print-color-adjust: exact !important;
          background-color: white !important;
        }

        /*
           CRITICAL PRINT FIXES:
           The main app container uses flex and min-h-dvh which breaks printing (clips content).
           We must reset these to block/auto for print.
        */
        #root, .min-h-dvh {
            display: block !important;
            height: auto !important;
            overflow: visible !important;
        }

        /* Hide Sidebar and non-print elements */
        aside, .print\:hidden {
          display: none !important;
        }

        /* Unwrap the main content area */
        main {
          margin: 0 !important;
          padding: 0 !important;
          width: 100% !important;
          max-width: none !important;
          height: auto !important;
          overflow: visible !important;
          display: block !important;
        }

        /* Ensure Tables Expand */
        table {
          width: 100% !important;
          table-layout: fixed !important;
        }

        thead {
            display: table-header-group;
        }

        tr {
            break-inside: avoid;
        }

        /* Reset Scrolling containers */
        .overflow-auto, .overflow-y-auto, .overflow-x-hidden {
          overflow: visible !important;
          height: auto !important;
          max-height: none !important;
        }

        /* Remove sticky headers in print to avoid overlap/cut-off */
        .sticky {
            position: static !important;
        }

        /* Hide scrollbars */
        ::-webkit-scrollbar {
          display: none;
        }
      }
    </style>
</head>
  <body class="antialiased">
    <!-- App loading splash — always shown for at least MIN_MS, then hidden once React mounts -->
    <style>
      @keyframes splash-pulse {
        0%,100% { opacity:.35; transform:scale(1); }
        50%      { opacity:1;   transform:scale(1.08); }
      }
      @keyframes splash-dot {
        0%,80%,100% { opacity:.2; transform:translateY(0); }
        40%          { opacity:1;  transform:translateY(-6px); }
      }
      #splash-dots span { display:inline-block; width:7px; height:7px; border-radius:50%; background:#1e3a5f; margin:0 3px; animation:splash-dot 1.2s infinite; }
      #splash-dots span:nth-child(2) { animation-delay:.2s; }
      #splash-dots span:nth-child(3) { animation-delay:.4s; }
    </style>
    <div id="app-splash" style="
      position:fixed;inset:0;background:#ffffff;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      z-index:99999;transition:opacity 0.4s ease;
    ">
      <img src="/radioplan/icon-192.png" alt="RadioPlan" style="width:96px;height:96px;border-radius:22px;box-shadow:0 8px 32px rgba(30,58,95,0.15);animation:splash-pulse 2s ease-in-out infinite;" />
      <p style="margin-top:20px;font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:1.4rem;font-weight:800;color:#1e3a5f;letter-spacing:0.04em;">RadioPlan</p>
      <p style="margin-top:4px;font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:0.75rem;font-weight:500;color:#64748b;letter-spacing:0.06em;text-transform:uppercase;">Radiothérapie</p>
      <div id="splash-dots" style="margin-top:32px;"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
    <script>
      /* Show splash for AT LEAST 1800ms, even if React mounts from SW cache instantly */
      (function(){
        var splash = document.getElementById('app-splash');
        if (!splash) return;
        var MIN_MS = 1800;
        var startTime = Date.now();
        var reactReady = false;

        function dismiss() {
          if (!splash || !splash.parentNode) return;
          splash.style.opacity = '0';
          setTimeout(function(){ if (splash && splash.parentNode) splash.parentNode.removeChild(splash); }, 420);
        }

        function maybeDissmiss() {
          var elapsed = Date.now() - startTime;
          var wait = Math.max(0, MIN_MS - elapsed);
          setTimeout(dismiss, wait);
        }

        /* Poll every 80ms for React mount */
        var timer = setInterval(function(){
          var root = document.getElementById('root');
          if (root && root.firstChild) {
            clearInterval(timer);
            clearTimeout(fallback);
            maybeDissmiss();
          }
        }, 80);

        /* Hard fallback after 8s in case something goes wrong */
        var fallback = setTimeout(function(){ clearInterval(timer); dismiss(); }, 8000);
      })();
    </script>
</body>
</html>
